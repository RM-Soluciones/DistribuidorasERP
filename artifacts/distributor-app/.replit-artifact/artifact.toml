kind = "web"
previewPath = "/"
title = "Distribuidora App"
version = "1.0.0"
id = "artifacts/distributor-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24384
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/distributor-app run dev"

[services.env]
PORT = "24384"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/distributor-app", "run", "build"]
publicDir = "artifacts/distributor-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
